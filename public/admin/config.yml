backend:
  name: github
  repo: rafaelncintra/rclr-website
  branch: main
  base_url: https://rclr-oauth.rafael-a35.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Language, name: lang, widget: select, options: [pt, en], default: pt }
      - { label: Published, name: published, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: talks
    label: Palestras
    folder: content/talks
    create: true
    slug: "{{order}}-{{conference}}"
    fields:
      - { label: Ordem, name: order, widget: number, value_type: int }
      - { label: Conferência, name: conference, widget: string }
      - { label: Ano, name: year, widget: string }
      - { label: Internacional, name: international, widget: boolean, default: false }
      - label: Palestrantes
        name: speakers
        widget: list
      - { label: "Tema (PT)", name: topic_pt, widget: string }
      - { label: "Tema (EN)", name: topic_en, widget: string }
      - { label: "Local (PT)", name: location_pt, widget: string }
      - { label: "Local (EN)", name: location_en, widget: string }
